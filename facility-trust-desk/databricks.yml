bundle:
  name: facility-trust-desk

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: 'facility-trust-desk'
      description: 'Track 1 Facility Trust Desk - capability trust signals over the cleaned virtue foundation dataset'
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-7e131722-a0b1.cloud.databricks.com

    variables:
      sql_warehouse_id: 1b2d6ee9a64f1fca
